# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json
repos:
  - repo: builtin
    hooks:
      - id: "trailing-whitespace"

      - id: "end-of-file-fixer"

      - id: "check-yaml"
        args: ["--allow-multiple-documents"]

      - id: "check-json"

  - repo: local
    hooks:
      - id: "dotnet-format"
        name: format C#
        entry: dotnet format
        files: "\\.cs$"
        language: system
        pass_filenames: false
        priority: 20

      - id: "dotnet-build-no-warnings"
        name: check C#
        entry: dotnet build Altinn.Register.sln --no-restore -warnaserror
        files: "\\.(cs|csproj|props|targets|sln)$"
        language: system
        pass_filenames: false
        priority: 20
